<!doctype html>
<html lang="az">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>M&L Parfums APK - Dark Catalog</title>
    <link rel="stylesheet" href="css/apk-concepts.css" />
    <link rel="stylesheet" href="css/apk-selected.css" />
  </head>
  <body>
    <main class="selectedPage">
      <section class="selectedIntro" aria-label="Selected APK direction">
        <span class="eyebrow">Selected APK direction</span>
        <h1>Dark Catalog</h1>
        <p>Qara dizaynda məhsul axtarışı, filtr, sürətli səbət və alt naviqasiya fokuslu mobil interfeys.</p>
      </section>

      <section class="selectedPreview" aria-label="Dark catalog app preview">
        <div class="phone catalog selectedPhone">
          <div class="phoneStatus"><span>9:41</span><span>5G</span></div>
          <div class="screenTitle">
            <h3>Catalog</h3>
            <button type="button">Filter</button>
          </div>
          <label class="searchBox">
            <span>Search perfume</span>
            <input value="oud amber" aria-label="Search perfume" />
          </label>
          <div class="chips">
            <button type="button">All</button>
            <button type="button">Oud</button>
            <button type="button">Fresh</button>
          </div>
          <section class="shopGrid">
            <article>
              <img src="img/product/2.jpg" alt="" />
              <strong>Amber Wood</strong>
              <span>68.50 AZN</span>
            </article>
            <article>
              <img src="img/product/6.jpg" alt="" />
              <strong>Royal Oud</strong>
              <span>95 AZN</span>
            </article>
            <article>
              <img src="img/product/9.jpg" alt="" />
              <strong>Fresh Signature</strong>
              <span>61 AZN</span>
            </article>
            <article>
              <img src="img/product/4.jpg" alt="" />
              <strong>Velvet Rose</strong>
              <span>59.99 AZN</span>
            </article>
          </section>
          <div class="selectedCart">
            <div>
              <span>Cart</span>
              <strong>2 items</strong>
            </div>
            <button type="button">Checkout</button>
          </div>
          <nav class="tabbar"><span>Home</span><span>Catalog</span><span>Cart</span><span>Profile</span></nav>
        </div>
      </section>
    </main>
  </body>
</html>
